{% extends 'base.html' %}

{% block content %}
  <h1>{{ course.name }}</h1>
  <a href="{% url 'create_module' course.id %}">Добавить модуль</a>
  <h2>Модули:</h2>
  <ul>
    {% for module in modules %}
      <li>
        <a href="{% url 'module_detail' module.id %}">{{ module.title }}</a>
        <a href="{% url 'edit_module' module.id %}">Редактировать</a>
        <a href="{% url 'delete_module' module.id %}">Удалить</a>
      </li>
    {% endfor %}
  </ul>
{% endblock %}
