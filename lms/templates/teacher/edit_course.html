{% extends 'base.html' %}

{% block content %}
<h2>Редактировать курс: {{ course.name }}</h2>
<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit" class="btn btn-primary">Сохранить</button>
  <a href="{% url 'course_detail' course.id %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
