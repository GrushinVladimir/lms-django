{% extends 'base.html' %}

{% block content %}
<h2>Редактировать модуль: {{ module.title }}</h2>
<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit" class="btn btn-primary">Сохранить</button>
  <a href="{% url 'module_detail' module.id %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
