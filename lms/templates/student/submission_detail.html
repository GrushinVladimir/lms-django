{% extends 'base.html' %}

{% block content %}
<h2>Сдача задания: {{ submission.assignment.material.title }}</h2>
<p>Статус: {{ submission.get_status_display }}</p>
<p>Оценка: {{ submission.grade.score }}</p>
<p>Обратная связь: {{ submission.grade.feedback }}</p>
<a href="{% url 'material_detail' submission.assignment.material.id %}" class="btn btn-secondary">Вернуться к материалу</a>
{% endblock %}
