{% extends 'base.html' %}

{% block content %}
  <h1>Чат с {{ chat.student.username }}</h1>
  <div>
    {% for message in messages %}
      <p><strong>{{ message.sender.username }}:</strong> {{ message.content }}</p>
    {% endfor %}
  </div>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Отправить</button>
  </form>
{% endblock %}
