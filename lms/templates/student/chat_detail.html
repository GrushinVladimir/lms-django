{% extends 'base.html' %}

{% block content %}
<h2>Чат с {{ chat.student.username }}</h2>
<div class="chat-messages">
  {% for message in messages %}
    <div class="chat-message {% if message.sender == request.user %}sent{% else %}received{% endif %}">
      <p>{{ message.content }}</p>
      <small>{{ message.sent_at|date:"d.m.Y H:i" }}</small>
    </div>
  {% endfor %}
</div>
<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit" class="btn btn-primary">Отправить</button>
</form>
<a href="{% url 'course_detail' chat.course.id %}" class="btn btn-secondary mt-3">Вернуться к курсу</a>
{% endblock %}
