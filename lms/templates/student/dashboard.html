{% extends 'base.html' %}

{% block content %}
  <h1>Панель студента</h1>
  <h2>Добро пожаловать, {{ user.username }}!</h2>
  <h3>Ваши курсы:</h3>
  <ul>
    {% for course in courses %}
      <li><a href="{% url 'course_detail' course.id %}">{{ course.name }}</a></li>
    {% endfor %}
  </ul>
{% endblock %}
